<div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
    {% for feature in app_features %}
    <div class="app-feature-card card p-6 text-center hover:-translate-y-2 transition-all duration-300">
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 app-feature-icon">
            <i class="fas {{ feature.icon }} text-xl"></i>
        </div>
        <h3 class="text-lg font-black section-heading mb-2">{{ feature.title }}</h3>
        <p class="text-gray-600 text-sm leading-relaxed">{{ feature.description }}</p>
    </div>
    {% endfor %}
</div>
